version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: postgresrepz
    environment:
      POSTGRES_DB: repz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d repz"]
      interval: 5s
      timeout: 5s
      retries: 10


  minio:
    image: minio/minio:latest
    container_name: repzminio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build: ./repz/back
    container_name: repzapi
    ports:
      - "8080:8080"
    env_file: ./repz/back/.env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/repz
      MINIO_URL: http://minio:9000
      MINIO_EXTERNAL_URL: http://localhost:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  front:
    build: ./repz/frontend/repz
    container_name: repzfront
    ports:
      - "4200:4200"
    depends_on:
      - api

volumes:
  minio_data:

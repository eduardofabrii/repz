name: CI - Ambiente Dev

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

permissions:
  contents: read

concurrency:
  group: ci-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Back-end build and tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: repz
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d repz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: jdbc:postgresql://localhost:5432/repz
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ci-dev-secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run unit/integration tests
        working-directory: ./back
        run: mvn -B clean verify

      - name: Upload back-end test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            back/target/surefire-reports/**
            back/target/failsafe-reports/**
          if-no-files-found: ignore

  frontend:
    name: Front-end build and tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/repz/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend/repz
        run: npm ci

      - name: Run unit tests
        working-directory: ./frontend/repz
        run: npm run test:ci

      - name: Build front-end
        working-directory: ./frontend/repz
        run: npm run build -- --configuration production

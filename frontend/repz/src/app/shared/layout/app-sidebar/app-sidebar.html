<div class="logo">
  <img class="brand-symbol" src="/assets/repz-symbol.png" alt="" aria-hidden="true" />
  <img class="brand-wordmark" src="/assets/repz-wordmark.png" alt="REPZ" />
</div>

<!-- perfil no topo -->
<div class="profile-block">
  <div class="avatar avatar-lg">{{ inicial() }}</div>
  <div class="pb-info">
    <div class="pb-role">{{ subtitulo() }}</div>
    <div class="pb-name">{{ nome() }}</div>
  </div>
</div>

<nav class="nav">
  @for (sec of secoes(); track sec.key) {
    <div class="nav-group" [class.is-open]="isExpandida(sec.key)">
      <!-- Cabeçalho da seção (clicável quando há mais de uma seção) -->
      @if (secoes().length > 1) {
        <button
          type="button"
          class="nav-group-header"
          (click)="toggleSecao(sec.key)"
          [attr.aria-expanded]="isExpandida(sec.key)"
        >
          <span class="icon"><i [class]="'pi ' + sec.icon"></i></span>
          <span class="label">{{ sec.label }}</span>
          <i class="pi pi-chevron-down chev"></i>
        </button>
      } @else {
        <div class="nav-section">{{ sec.label }}</div>
      }

      <!-- Itens da seção -->
      <div
        class="nav-group-items"
        [class.is-hidden]="secoes().length > 1 && !isExpandida(sec.key)"
      >
        @for (item of sec.items; track item.key) {
          <a
            class="nav-item"
            [class.active]="ativo() === item.key"
            [routerLink]="item.link"
            [title]="item.label"
          >
            <span class="icon"><i [class]="'pi ' + item.icon"></i></span>
            <span class="label">{{ item.label }}</span>
          </a>
        }
      </div>
    </div>
  }
</nav>

<!-- card CTA embaixo -->
@if (mostrarCta()) {
  <div class="sidebar-cta">
    <div class="cta-card">
      <div class="cta-title">{{ ctaTitulo() }}</div>
      <div class="cta-desc">{{ ctaDescricao() }}</div>
      <p-button
        [label]="ctaLabel()"
        icon="pi pi-bolt"
        styleClass="repz-primary cta-btn"
        (onClick)="ctaClick.emit()"
      />
    </div>
    <p-button
      icon="pi pi-bolt"
      styleClass="repz-primary cta-mini"
      [title]="ctaLabel()"
      [ariaLabel]="ctaLabel()"
      (onClick)="ctaClick.emit()"
    />
  </div>
}

<!-- Botão de logout — sempre visível, no rodapé -->
<div class="sidebar-logout">
  <button
    type="button"
    class="logout-btn"
    (click)="logout()"
    title="Sair"
    aria-label="Sair"
  >
    <i class="pi pi-sign-out"></i>
    <span class="label">Sair</span>
  </button>
</div>

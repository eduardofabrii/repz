<app-shell
  ativo="dashboard"
  [crumbs]="['Admin', 'Dashboard']"
  nome="Admin"
  subtitulo="Administração"
  [mostrarCta]="false"
>
  <div class="page-header">
    <div>
      <div class="page-title">Administração</div>
      <div class="page-subtitle">Acesso rápido aos cadastros mantidos pelo perfil ADMIN.</div>
    </div>
  </div>

  <div class="dash-grid">
    <p-card styleClass="repz-card dash-card">
      <div class="dash-kicker">Cadastro</div>
      <h2>Academias</h2>
      <p>CRUD completo das academias da plataforma.</p>
      <p-button
        label="Abrir"
        icon="pi pi-arrow-right"
        iconPos="right"
        styleClass="repz-primary"
        routerLink="/admin/academias"
      />
    </p-card>

    <p-card styleClass="repz-card dash-card">
      <div class="dash-kicker">Pessoas</div>
      <h2>Personais</h2>
      <p>Gerencie personais de todas as academias.</p>
      <p-button
        label="Abrir"
        icon="pi pi-arrow-right"
        iconPos="right"
        styleClass="repz-primary"
        routerLink="/admin/personais"
      />
    </p-card>

    <p-card styleClass="repz-card dash-card">
      <div class="dash-kicker">Pessoas</div>
      <h2>Alunos</h2>
      <p>Gerencie matrículas de alunos em qualquer academia.</p>
      <p-button
        label="Abrir"
        icon="pi pi-arrow-right"
        iconPos="right"
        styleClass="repz-primary"
        routerLink="/admin/alunos"
      />
    </p-card>
  </div>
</app-shell>

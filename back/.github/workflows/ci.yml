name: CI Pipeline - Repz (Develop)

on:
  push:
    branches: [ "develop" ] # Aciona a cada push na branch develop
  pull_request:
    branches: [ "develop" ] # Aciona quando um PR é aberto para a develop

jobs:
  # Build e Testes do Back-end (Spring Boot)
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21' # Versão especificada no pom.xml
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test with Maven
        working-directory: ./back
        run: mvn clean install # Compila e executa os testes unitários

  # Build e Testes do Front-end (Angular)
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21' # Versão compatível com o packageManager do package.json
          cache: 'npm'
          cache-dependency-path: ./frontend/repz/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend/repz/
        run: npm ci

      - name: Run Tests
        working-directory: ./frontend/repz/
        run: npm test -- --watch=false --browsers=ChromeHeadless # Executa os testes do Angular

      - name: Build Angular
        working-directory: ./frontend/repz/
        run: npm run build # Valida se o build de produção está funcionando
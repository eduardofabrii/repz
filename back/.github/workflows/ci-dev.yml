name: CI - Ambiente Dev

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Back-end
        working-directory: ./back
        run: mvn clean install # Valida Spring Boot e dependências

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '21'

      - name: Build Front-end
        working-directory: ./frontend/repz
        run: |
          npm ci
          npx vitest run # Executa testes unitários do Angular
          npm run build